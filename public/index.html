<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Prediction Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 20px; font-weight: 700; color: #58a6ff; }
    header span { font-size: 12px; color: #8b949e; }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 20px 24px 0;
      border-bottom: 1px solid #30363d;
      flex-wrap: wrap;
    }
    .tab {
      padding: 10px 20px;
      border-radius: 6px 6px 0 0;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      background: transparent;
      color: #8b949e;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; background: #161b22; }
    .tab:hover:not(.active) { color: #e6edf3; }
    .controls {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-primary:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }
    .refresh-info { font-size: 12px; color: #8b949e; }

    .arb-alert {
      background: linear-gradient(90deg, #1a0a2e 0%, #2d1b4e 100%);
      border: 1px solid #8b5cf6;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 0 24px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .arb-alert-icon { font-size: 24px; }
    .arb-alert-text { flex: 1; }
    .arb-alert-title { font-weight: 700; color: #a78bfa; font-size: 14px; }
    .arb-alert-desc { font-size: 12px; color: #c4b5fd; margin-top: 2px; }
    .arb-profit { font-size: 18px; font-weight: 800; color: #10b981; }

    .content { padding: 0 24px 24px; }
    .loading { text-align: center; padding: 60px; color: #8b949e; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      background: #1a0a0a;
      border: 1px solid #6e1010;
      border-radius: 8px;
      padding: 16px;
      color: #f85149;
    }
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 16px;
    }
    .game-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .game-card:hover { border-color: #58a6ff44; }
    .game-card.value-bet { border-color: #2ea04388; }
    .card-header {
      background: #1c2128;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .teams { font-size: 15px; font-weight: 700; }
    .game-time { font-size: 12px; color: #8b949e; margin-top: 4px; }
    .header-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .rank-badge {
      display: inline-block;
      background: #388bfd22;
      color: #58a6ff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 4px;
    }
    .card-body { padding: 14px 16px; }

    .weather-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #1c3a5e;
      color: #7dd3fc;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .lines-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .line-item { flex: 1; min-width: 70px; }
    .line-label { font-size: 10px; color: #8b949e; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .line-value { font-size: 15px; font-weight: 700; }
    .line-value.favorite { color: #3fb950; }

    /* ============================================================ */
    /* LINE MOVEMENT TABLE — full-detail Open vs Current vs Move    */
    /* ============================================================ */
    .movement-section {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .movement-title {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .movement-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .movement-table th {
      text-align: left;
      font-size: 10px;
      color: #8b949e;
      font-weight: 600;
      text-transform: uppercase;
      padding: 4px 6px 6px;
      border-bottom: 1px solid #21262d;
    }
    .movement-table td {
      padding: 6px;
      border-bottom: 1px solid #1a1f26;
    }
    .movement-table tr:last-child td { border-bottom: none; }
    .movement-table .market-name {
      font-weight: 700;
      color: #e6edf3;
    }
    .movement-table .num-cell {
      font-family: 'SF Mono', Menlo, monospace;
      font-weight: 600;
    }
    .move-up { color: #f85149; font-weight: 700; }
    .move-down { color: #3fb950; font-weight: 700; }
    .move-flat { color: #8b949e; }

    .sharp-signals {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #21262d;
    }
    .sharp-signal-item {
      font-size: 11px;
      padding: 4px 8px;
      margin-top: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sharp-signal-item.strong {
      background: #2d1500;
      border: 1px solid #d29922;
      color: #f0c674;
    }
    .sharp-signal-item.moderate {
      background: #1a1a0a;
      border: 1px solid #6b5b00;
      color: #d29922;
    }
    .sharp-icon { font-size: 13px; }

    .prediction-row {
      background: #0d1117;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .pred-label { font-size: 11px; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .pred-score { font-size: 18px; font-weight: 800; color: #58a6ff; }
    .edges-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .edge-chip {
      flex: 1;
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }
    .edge-chip.positive { background: #0f2a1a; border: 1px solid #2ea04355; }
    .edge-chip.negative { background: #1a0f0f; border: 1px solid #6e101055; }
    .edge-chip.neutral { background: #1c2128; border: 1px solid #30363d; }
    .edge-label { font-size: 10px; color: #8b949e; margin-bottom: 2px; text-transform: uppercase; }
    .edge-val { font-size: 14px; font-weight: 800; }
    .edge-chip.positive .edge-val { color: #3fb950; }
    .edge-chip.negative .edge-val { color: #f85149; }
    .edge-chip.neutral .edge-val { color: #8b949e; }
    .kelly-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .kelly-chip {
      flex: 1;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }
    .kelly-label { font-size: 10px; color: #8b949e; margin-bottom: 2px; text-transform: uppercase; }
    .kelly-val { font-size: 14px; font-weight: 800; color: #d2a679; }

    .picks-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .pick-chip {
      flex: 1;
      background: #0f2a1a;
      border: 1px solid #2ea04355;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
    }
    .pick-chip.weak {
      background: #1c2128;
      border-color: #30363d;
    }
    .pick-label { font-size: 10px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; }
    .pick-value { font-size: 14px; font-weight: 800; color: #3fb950; }
    .pick-chip.weak .pick-value { color: #8b949e; }

    .recommendation {
      background: linear-gradient(90deg, #0f2a1a 0%, #1a3d2a 100%);
      border: 1px solid #2ea043;
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .rec-label { font-size: 10px; color: #8b949e; text-transform: uppercase; margin-bottom: 2px; }
    .rec-value { font-size: 16px; font-weight: 800; color: #3fb950; }
    .rec-edge { font-size: 14px; font-weight: 700; color: #3fb950; background: #2ea04333; padding: 4px 10px; border-radius: 4px; }

    .confidence {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .confidence.High { background: #0f2a1a; color: #3fb950; }
    .confidence.Medium { background: #1a1a0a; color: #d29922; }
    .confidence.Low { background: #1a0f0f; color: #f85149; }
    .factors { margin-top: 8px; }
    .factors-label { font-size: 11px; color: #8b949e; margin-bottom: 5px; }
    .factor-item {
      font-size: 12px;
      color: #8b949e;
      padding: 3px 0;
      border-top: 1px solid #21262d;
    }
    .factor-item:before { content: '→ '; color: #58a6ff; }
    .value-badge {
      display: inline-block;
      background: #2ea04322;
      color: #3fb950;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
    }
    .no-games {
      text-align: center;
      padding: 48px;
      color: #8b949e;
      font-size: 15px;
    }

    @media (max-width: 500px) {
      .games-grid { grid-template-columns: 1fr; }
      .tabs { padding: 12px 16px 0; }
      .tab { padding: 8px 12px; font-size: 12px; }
      .controls { padding: 12px 16px; }
      .content { padding: 0 16px 16px; }
      header { padding: 12px 16px; }
      .movement-table { font-size: 11px; }
      .movement-table th, .movement-table td { padding: 4px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ Sports Prediction Agent</h1>
    <span id="last-updated">Not yet loaded</span>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('nba', this)">🏀 NBA</button>
    <button class="tab" onclick="switchTab('nhl', this)">🏒 NHL</button>
    <button class="tab" onclick="switchTab('nfl', this)">🏈 NFL</button>
    <button class="tab" onclick="switchTab('mlb', this)">⚾ MLB</button>
    <button class="tab" onclick="switchTab('cbb', this)">🏫 CBB</button>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="fetch-btn" onclick="fetchPredictions()">Fetch Predictions</button>
    <span class="refresh-info" id="refresh-info">Click to load predictions with live betting lines</span>
  </div>

  <div id="arb-container"></div>

  <div class="content" id="content">
    <div class="no-games">Select a sport tab and click Fetch Predictions to begin.</div>
  </div>

  <script>
    let currentSport = 'nba';
    let cache = {};

    function switchTab(sport, el) {
      currentSport = sport;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      if (cache[sport]) {
        renderGames(cache[sport]);
      } else {
        document.getElementById('content').innerHTML = '<div class="no-games">Click Fetch Predictions to load ' + sport.toUpperCase() + ' data.</div>';
        document.getElementById('arb-container').innerHTML = '';
      }
    }

    async function fetchPredictions() {
      const btn = document.getElementById('fetch-btn');
      const info = document.getElementById('refresh-info');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      info.textContent = 'Fetching live data & running predictions...';
      document.getElementById('arb-container').innerHTML = '';

      document.getElementById('content').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div>Analyzing ${currentSport.toUpperCase()} games with live odds...</div>
        </div>`;

      try {
        const res = await fetch('/api/predictions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sport: currentSport })
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        // DEBUG: Log the full response
        console.log('API Response:', data);
        if (data.games && data.games.length > 0) {
          console.log('First game:', data.games[0]);
          console.log('Line movement:', data.games[0].lineMovement);
          console.log('Sharp signals:', data.games[0].sharpSignals);
        }

        cache[currentSport] = data;
        renderGames(data);
        document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
        info.textContent = `Loaded ${data.games?.length || 0} games`;

        setTimeout(() => {
          if (currentSport === data.sport?.toLowerCase()) fetchPredictions();
        }, 300000);

      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
        info.textContent = 'Error loading data. Try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Fetch Predictions';
      }
    }

    function safeNum(val) {
      const num = parseFloat(val);
      return isNaN(num) ? null : num;
    }

    function formatEdge(val) {
      if (val === null || val === undefined) return 'N/A';
      const num = parseFloat(val);
      if (isNaN(num)) return 'N/A';
      return (num > 0 ? '+' : '') + num.toFixed(1) + '%';
    }

    function formatKelly(val) {
      if (val === null || val === undefined) return '0%';
      const num = parseFloat(val);
      if (isNaN(num)) return '0%';
      return num.toFixed(1) + '%';
    }

    function edgeClass(val) {
      const num = safeNum(val);
      if (num === null) return 'neutral';
      if (num > 1) return 'positive';
      if (num < -1) return 'negative';
      return 'neutral';
    }

    function isValueBet(game) {
      const spreadEdge = safeNum(game.spreadEdge);
      const totalEdge = safeNum(game.totalEdge);
      return Math.abs(spreadEdge || 0) >= 3 || Math.abs(totalEdge || 0) >= 3;
    }

    // Format a single number for the movement table — handles null, plus signs, etc.
    function fmtNum(val, withPlus) {
      if (val === null || val === undefined || isNaN(val)) return '—';
      const num = parseFloat(val);
      if (withPlus && num > 0) return '+' + num;
      return String(num);
    }

    // Format a movement value with color and arrow
    function fmtMovement(val) {
      if (val === null || val === undefined || isNaN(val) || val === 0) {
        return { text: 'no move', cls: 'move-flat' };
      }
      const num = parseFloat(val);
      if (num > 0) return { text: '↑ +' + num.toFixed(1), cls: 'move-up' };
      return { text: '↓ ' + num.toFixed(1), cls: 'move-down' };
    }

    // ========================================================================
    // NEW: Render the full-detail line movement section
    // Shows: market | open | current | movement, plus sharp signals below
    // ========================================================================
    function renderLineMovement(game) {
      const lm = game.lineMovement;
      if (!lm) return '';

      // Bail if we don't have any meaningful data
      const hasSpread = lm.openSpread !== null && lm.openSpread !== undefined;
      const hasTotal = lm.openTotal !== null && lm.openTotal !== undefined;
      const hasML = lm.homeML !== null && lm.homeML !== undefined;
      if (!hasSpread && !hasTotal && !hasML) return '';

      const bookmakerLabel = game.bookmaker ? `via ${game.bookmaker}` : 'via ESPN/DraftKings';

      let rows = '';

      if (hasSpread) {
        const spreadMov = fmtMovement(lm.spreadMovement);
        rows += `
          <tr>
            <td class="market-name">Spread</td>
            <td class="num-cell">${fmtNum(lm.openSpread, true)}</td>
            <td class="num-cell">${fmtNum(lm.currentSpread, true)}</td>
            <td class="num-cell ${spreadMov.cls}">${spreadMov.text}</td>
          </tr>`;
      }

      if (hasTotal) {
        const totalMov = fmtMovement(lm.totalMovement);
        rows += `
          <tr>
            <td class="market-name">Total</td>
            <td class="num-cell">${fmtNum(lm.openTotal)}</td>
            <td class="num-cell">${fmtNum(lm.currentTotal)}</td>
            <td class="num-cell ${totalMov.cls}">${totalMov.text}</td>
          </tr>`;
      }

      // Money lines: we only have current from ESPN scrape, not opening — show as a single row
      if (hasML) {
        rows += `
          <tr>
            <td class="market-name">ML (current)</td>
            <td class="num-cell" colspan="2">Home ${fmtNum(lm.homeML, true)} / Away ${fmtNum(lm.awayML, true)}</td>
            <td class="move-flat">—</td>
          </tr>`;
      }

      // Sharp signals section
      let signalsHTML = '';
      if (game.sharpSignals && game.sharpSignals.length > 0) {
        signalsHTML = '<div class="sharp-signals">';
        game.sharpSignals.forEach(sig => {
          const icon = sig.magnitude === 'strong' ? '🚨' : '⚠️';
          const label = sig.magnitude === 'strong' ? 'STRONG' : 'Moderate';
          const moveStr = sig.movement > 0 ? '+' + sig.movement : sig.movement;
          signalsHTML += `
            <div class="sharp-signal-item ${sig.magnitude}">
              <span class="sharp-icon">${icon}</span>
              <span><strong>${label} ${sig.market} signal:</strong> moved ${moveStr} ${sig.direction}</span>
            </div>`;
        });
        signalsHTML += '</div>';
      }

      return `
        <div class="movement-section">
          <div class="movement-title">
            <span>📈 Line Movement (Open → Current)</span>
            <span style="color:#6e7681; font-size:10px; text-transform:none;">${bookmakerLabel}</span>
          </div>
          <table class="movement-table">
            <thead>
              <tr>
                <th>Market</th>
                <th>Open</th>
                <th>Current</th>
                <th>Move</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
          ${signalsHTML}
        </div>`;
    }

    function renderArbitrageAlerts(arbs) {
      const container = document.getElementById('arb-container');
      if (!arbs || arbs.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = arbs.map(arb => `
        <div class="arb-alert">
          <div class="arb-alert-icon">💰</div>
          <div class="arb-alert-text">
            <div class="arb-alert-title">ARBITRAGE OPPORTUNITY</div>
            <div class="arb-alert-desc">${arb.description || arb.homeTeam + ' vs ' + arb.awayTeam}</div>
          </div>
          <div class="arb-profit">+${arb.profit}%</div>
        </div>
      `).join('');
    }

    function renderGames(data) {
      const games = data.games || [];
      renderArbitrageAlerts(data.arbitrageAlerts);

      if (!games.length) {
        document.getElementById('content').innerHTML = '<div class="no-games">No games found for today.</div>';
        return;
      }

      const html = games.map(g => {
        const valueBet = isValueBet(g);
        const valueBadge = valueBet ? '<span class="value-badge">VALUE BET</span>' : '';

        let weatherBadge = '';
        if (g.weather) {
          weatherBadge = `<span class="weather-badge">🌡️ ${g.weather.temperature}°F ${g.weather.windSpeed}mph</span>`;
        }

        const favoriteTeam = g.favorite || '';
        const homeIsFavorite = favoriteTeam.includes(g.homeTeam?.split(' ').pop());

        // NEW: Full-detail line movement section (replaces old movementHTML)
        const movementHTML = renderLineMovement(g);

        let linesHTML = `
          <div class="lines-row">
            <div class="line-item"><div class="line-label">Spread</div><div class="line-value">${g.spread ?? 'N/A'}</div></div>
            <div class="line-item"><div class="line-label">Total</div><div class="line-value">${g.total ?? 'N/A'}</div></div>
            <div class="line-item"><div class="line-label">Home ML</div><div class="line-value ${homeIsFavorite ? 'favorite' : ''}">${g.homeML ?? 'N/A'}</div></div>
            <div class="line-item"><div class="line-label">Away ML</div><div class="line-value ${!homeIsFavorite ? 'favorite' : ''}">${g.awayML ?? 'N/A'}</div></div>
          </div>`;

        const spreadEdgeNum = safeNum(g.spreadEdge);
        const totalEdgeNum = safeNum(g.totalEdge);

        let edgesHTML = `
          <div class="edges-row">
            <div class="edge-chip ${edgeClass(g.spreadEdge)}">
              <div class="edge-label">Spread Edge</div>
              <div class="edge-val">${formatEdge(g.spreadEdge)}</div>
            </div>
            <div class="edge-chip ${edgeClass(g.totalEdge)}">
              <div class="edge-label">Total Edge</div>
              <div class="edge-val">${formatEdge(g.totalEdge)}</div>
            </div>
          </div>
          <div class="kelly-row">
            <div class="kelly-chip"><div class="kelly-label">Half Kelly Spread</div><div class="kelly-val">${formatKelly(g.kellySpread)}</div></div>
            <div class="kelly-chip"><div class="kelly-label">Half Kelly Total</div><div class="kelly-val">${formatKelly(g.kellyTotal)}</div></div>
          </div>`;

        const spreadPickStrong = Math.abs(spreadEdgeNum || 0) >= 2;
        const totalPickStrong = Math.abs(totalEdgeNum || 0) >= 2;

        const picksHTML = `
          <div class="picks-row">
            <div class="pick-chip ${spreadPickStrong ? '' : 'weak'}">
              <div class="pick-label">Spread Pick</div>
              <div class="pick-value">${g.spreadPick || 'No edge'}</div>
            </div>
            <div class="pick-chip ${totalPickStrong ? '' : 'weak'}">
              <div class="pick-label">Total Pick</div>
              <div class="pick-value">${g.totalPick || 'No edge'}</div>
            </div>
          </div>`;

        let recommendationHTML = '';
        if (valueBet) {
          const bestSpreadEdge = Math.abs(spreadEdgeNum || 0);
          const bestTotalEdge = Math.abs(totalEdgeNum || 0);
          let bestPick = '';
          let bestEdge = 0;

          if (bestSpreadEdge >= bestTotalEdge && bestSpreadEdge >= 3) {
            bestPick = g.spreadPick;
            bestEdge = spreadEdgeNum;
          } else if (bestTotalEdge >= 3) {
            bestPick = g.totalPick;
            bestEdge = totalEdgeNum;
          }

          if (bestPick && bestEdge !== null && bestEdge !== undefined && !isNaN(bestEdge)) {
            recommendationHTML = `
              <div class="recommendation">
                <div>
                  <div class="rec-label">Recommendation</div>
                  <div class="rec-value">🎯 ${bestPick}</div>
                </div>
                <div class="rec-edge">+${Math.abs(bestEdge).toFixed(1)}% edge</div>
              </div>`;
          }
        }

        const factors = (g.keyFactors || []).map(f => `<div class="factor-item">${f}</div>`).join('');

        // INJURY REPORT DISPLAY
        let injuriesHTML = '';
        if (g.stats?.injuries) {
          const homeInjuries = g.stats.injuries.home || [];
          const awayInjuries = g.stats.injuries.away || [];

          if (homeInjuries.length > 0 || awayInjuries.length > 0) {
            injuriesHTML = '<div class="factors"><div class="factors-label">🏥 Injury Report</div>';

            if (homeInjuries.length > 0) {
              injuriesHTML += `<div style="margin-top: 6px; padding: 6px 0; border-top: 1px solid #21262d;">`;
              injuriesHTML += `<div style="font-size: 11px; color: #58a6ff; font-weight: 600; margin-bottom: 4px;">${g.homeTeam}</div>`;
              homeInjuries.forEach(inj => {
                const statusColor = inj.status === 'OUT' ? '#f85149' : inj.status === 'Q' ? '#d29922' : '#8b949e';
                injuriesHTML += `<div style="font-size: 11px; color: #8b949e; padding: 2px 0;">
                  <span style="color: ${statusColor}; font-weight: 700;">[${inj.status}]</span> ${inj.player} (${inj.position}) - ${inj.type}
                </div>`;
              });
              injuriesHTML += '</div>';
            }

            if (awayInjuries.length > 0) {
              injuriesHTML += `<div style="margin-top: 6px; padding: 6px 0; border-top: 1px solid #21262d;">`;
              injuriesHTML += `<div style="font-size: 11px; color: #58a6ff; font-weight: 600; margin-bottom: 4px;">${g.awayTeam}</div>`;
              awayInjuries.forEach(inj => {
                const statusColor = inj.status === 'OUT' ? '#f85149' : inj.status === 'Q' ? '#d29922' : '#8b949e';
                injuriesHTML += `<div style="font-size: 11px; color: #8b949e; padding: 2px 0;">
                  <span style="color: ${statusColor}; font-weight: 700;">[${inj.status}]</span> ${inj.player} (${inj.position}) - ${inj.type}
                </div>`;
              });
              injuriesHTML += '</div>';
            }

            injuriesHTML += '</div>';
          }
        }

        return `
          <div class="game-card ${valueBet ? 'value-bet' : ''}">
            <div class="card-header">
              <div>
                <div class="teams">${g.awayTeam} @ ${g.homeTeam}${valueBadge}</div>
                <div class="game-time">${g.gameTime || ''}</div>
              </div>
              <div class="header-badges">
                ${weatherBadge}
                <span class="confidence ${g.confidence}">${g.confidence || 'N/A'}</span>
              </div>
            </div>
            <div class="card-body">
              ${linesHTML}
              ${movementHTML}
              <div class="prediction-row">
                <div class="pred-label">Predicted Score</div>
                <div class="pred-score">${g.awayTeam?.split(' ').pop()} ${g.predictedScore?.away ?? '?'} — ${g.predictedScore?.home ?? '?'} ${g.homeTeam?.split(' ').pop()}</div>
              </div>
              ${edgesHTML}
              ${picksHTML}
              ${recommendationHTML}
              ${factors ? `<div class="factors"><div class="factors-label">Key Factors</div>${factors}</div>` : ''}
              ${injuriesHTML}
            </div>
          </div>`;
      }).join('');

      document.getElementById('content').innerHTML = `<div class="games-grid">${html}</div>`;
    }
  </script>
</body>
</html>
